<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; overflow-x: hidden; width: 100%; max-width: 100%; background: #f4f7fc; }
    .svy input, .svy select, .svy textarea { max-width: 100%; }
    .svy .ten { display: none; }
    .svy.lang-en .ten { display: revert; }
    .svy.lang-en .tzh { display: none; }
    .svy .lb-zh { background: #0569e9; color: #fff; }
    .svy.lang-en .lb-zh { background: transparent; color: #8b97ad; }
    .svy.lang-en .lb-en { background: #0569e9; color: #fff; }
    .svy input:focus, .svy select:focus, .svy textarea:focus { outline: none; border-color: #2f8bff !important; box-shadow: 0 0 0 3px rgba(47,139,255,.20); }
    .svy ::placeholder { color: #7e8aa3; }
    .scr::-webkit-scrollbar { width: 0; height: 4px; }
    .scr::-webkit-scrollbar-thumb { background: #27344e; border-radius: 2px; }
  </style>
</helmet>

<div class="svy {{ langClass }}" ref="{{ rootRef }}" style="width:100%; max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh; background:#f4f7fc; display:flex; flex-direction:column; position:relative; font-family:'Noto Sans TC',system-ui,sans-serif; color:#eaf1fb; overflow-x:hidden;">
  <div style="position:absolute; top:12px; right:12px; z-index:30;">
    <div style="display:flex; gap:2px; background:{{ toggleBg }}; border:1px solid {{ toggleBorder }}; border-radius:999px; padding:3px; box-shadow:0 2px 10px rgba(0,0,0,.25); backdrop-filter:blur(8px);">
      <button class="lb lb-zh" onClick="{{ setZh }}" style="border:0; border-radius:999px; padding:6px 14px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap;">中文</button>
      <button class="lb lb-en" onClick="{{ setEn }}" style="border:0; background:transparent; color:#8b97ad; border-radius:999px; padding:6px 14px; font-weight:700; font-size:13px; cursor:pointer; font-family:'Figtree',sans-serif; white-space:nowrap;">EN</button>
    </div>
  </div>
  {{ screen }}
</div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0569e9"/>
    <rect x="30" y="26" width="40" height="48" rx="6" fill="#fff"/>
    <rect x="37" y="35" width="26" height="4" rx="2" fill="#0569e9"/>
    <rect x="37" y="44" width="20" height="4" rx="2" fill="#cdd9ee"/>
    <rect x="37" y="58" width="26" height="9" rx="4" fill="#d9ff00"/>
  </svg>
</template>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;tech&quot;,&quot;bright&quot;],&quot;default&quot;:&quot;bright&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;zh&quot;,&quot;en&quot;],&quot;default&quot;:&quot;zh&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;reviewThreshold&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:8,&quot;min&quot;:0,&quot;max&quot;:10,&quot;tsType&quot;:&quot;number&quot;},&quot;lineUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://line.me/R/ti/p/@motorisland&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;endpointUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://script.google.com/macros/s/AKfycby7mIrufl8U4T0ZLp12gKNoFFGlFK5BMmHbYd1gRMdKgw0_1M8QEBk3YVUWmoU7SYEm/exec&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;blockResubmit&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = {
      lang: (props && props.defaultLang) || 'zh',
      step: 0,
      q1: '', q2: '', q3: '', q4: {}, q5: {}, q6: '', q7: [], nps: null,
      q9: '', q10: '', q12: '', q13: '',
      submitting: false, alreadyDone: false
    };
    this.Q4 = [
      { zh: '門市環境舒適度', en: 'Store environment' },
      { zh: '交易流程清晰度', en: 'Transaction clarity' },
      { zh: '再次選擇意願', en: 'Likelihood to return' }
    ];
    this.Q5 = [
      { zh: '服務態度', en: 'Service attitude' },
      { zh: '機車專業知識', en: 'Motorcycle expertise' },
      { zh: '整體服務人員評分', en: 'Overall staff rating' }
    ];
    this.Q7OPTS = [
      { v: '店員的態度與專業度', zh: '店員的態度與專業度', en: 'Staff attitude & expertise' },
      { v: '交易流程的透明性與效率', zh: '交易流程的透明性與效率', en: 'Transaction transparency & efficiency' },
      { v: '店內設施與氛圍', zh: '店內設施與氛圍', en: 'Store facilities & atmosphere' },
      { v: '車輛的選擇與品質', zh: '車輛的選擇與品質', en: 'Vehicle selection & quality' },
      { v: '售後服務與支持', zh: '售後服務與支持', en: 'After-sales service & support' },
      { v: '無特別想法', zh: '無特別想法', en: 'No specific feedback' }
    ];
    this.BRANCHES = ['新北中和店 / Zhonghe', '新北新莊店 / Xinzhuang', '新北樹林店 / Shulin', '桃園中壢店 / Zhongli', '新竹店 / Hsinchu', '台中旗艦店 / Taichung Flagship', '南台中店 / South Taichung', '台中太平店 / Taiping', '台南店 / Tainan', '高雄店 / Kaohsiung', '花蓮店 / Hualien'];
    // ★ 上線前：把每間店的 Google Place ID 填到 placeId，即會自動產生「直接寫評論」連結。
    //   取得方式：Google 地圖搜尋該店 → 分享 → 或用 place id finder。placeId 留空時自動退回「地圖搜尋」網址（保證可開）。
    // ★ 上線前每間店填兩個欄位：
    //   placeId — Google Place ID（產生「直接寫評論」連結；留空自動退回地圖搜尋）
    //   line    — 該門市自己的官方 LINE 優惠券連結（留空自動退回通用 lineUrl）
    this.stores = [
      { name: '新北中和店', code: 'zhonghe', placeId: '', line: '' },
      { name: '新北新莊店', code: 'xinzhuang', placeId: '', line: '' },
      { name: '新北樹林店', code: 'shulin', placeId: '', line: '' },
      { name: '桃園中壢店', code: 'zhongli', placeId: '', line: '' },
      { name: '新竹店', code: 'hsinchu', placeId: '', line: '' },
      { name: '台中旗艦店', code: 'taichung', placeId: '', line: '' },
      { name: '南台中店', code: 'south-taichung', placeId: '', line: '' },
      { name: '台中太平店', code: 'taiping', placeId: '', line: '' },
      { name: '台南店', code: 'tainan', placeId: '', line: '' },
      { name: '高雄店', code: 'kaohsiung', placeId: '', line: '' },
      { name: '花蓮店', code: 'hualien', placeId: '', line: '' }
    ].map(function (s) {
      return {
        name: s.name,
        code: s.code,
        line: s.line || '',
        url: s.placeId
          ? 'https://search.google.com/local/writereview?placeid=' + s.placeId
          : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('貳輪嶼 ' + s.name)
      };
    });
    this.steps = [
      { type: 'welcome' },
      { type: 'select', key: 'q1', zh: '本次服務門市', en: 'Which branch served you?' },
      { type: 'radio', key: 'q2', zh: '本次服務類型', en: 'Type of service' },
      { type: 'date', key: 'q3', zh: '來店日期', en: 'Visit date' },
      { type: 'matrix', key: 'q4', rows: 'Q4', zh: '整體服務體驗評分', en: 'Overall service experience', hzh: '1 分最低，10 分最高', hen: '1 = Lowest, 10 = Highest' },
      { type: 'matrix', key: 'q5', rows: 'Q5', zh: '服務人員評分', en: 'Staff performance rating', hzh: '1 分最不滿意，10 分最滿意', hen: '1 = Very dissatisfied, 10 = Very satisfied' },
      { type: 'textarea', key: 'q6', opt: true, zh: '服務人員表揚 / 建議', en: 'Staff recognition / feedback', hzh: '可填人員姓名或外貌特徵，以及表揚或需改進之處', hen: 'Name or describe the staff member, and share what impressed or disappointed you', ph: '（選填 / Optional）' },
      { type: 'checks', key: 'q7', opt: true, zh: '本次最滿意的部分', en: 'What impressed you most?', hzh: '可多選；若無特別想法可直接下一步', hen: 'Select all that apply; skip if none' },
      { type: 'nps', key: 'q8', zh: '您有多願意向親友推薦貳輪嶼？', en: 'How likely are you to recommend us?' },
      { type: 'text', key: 'q9', zh: '您會用哪些關鍵字形容貳輪嶼？', en: 'What keywords describe Motor Island?', hzh: '例如：專業、親切、透明、快速……', hen: 'e.g. professional, friendly, transparent, efficient…', ph: '關鍵字，用空格或逗號分隔 / Keywords, separated by spaces or commas' },
      { type: 'textarea', key: 'q10', opt: true, zh: '如果您是創辦人，您會想改善什麼？', en: 'If you were the founder, what would you improve?', ph: '（選填 / Optional）' },
      { type: 'contact', opt: true, zh: '如需進一步聯繫', en: 'For follow-up contact', hzh: '如有不滿意之處，歡迎留下聯絡資訊，我們將主動與您聯繫', hen: 'If you experienced any issues, leave your contact info and we will reach out' },
      { type: 'thanks' }
    ];
    this.QTOTAL = 11;
  }

  componentDidMount() {
    // 讀取來源參數：?store=門市代號 與 ?uid=LINE userId（或由 LIFF 自動帶入）
    try {
      var p = new URLSearchParams(window.location.search);
      this.srcStore = p.get('store') || '';
      this.lineUid = p.get('uid') || '';
    } catch (e) { this.srcStore = ''; this.lineUid = ''; }
    // 若帶了 store 參數，預先選好門市（顧客少填一題）
    if (this.srcStore && !this.state.q1) {
      var hit = this.stores.find((s) => s.code === this.srcStore || s.name === this.srcStore);
      if (hit) this.setState({ q1: hit.name });
    }
    if (!document.getElementById('__nototc')) {
      var l = document.createElement('link');
      l.id = '__nototc';
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap';
      document.head.appendChild(l);
    }
    this.applyBg();
    // 基本防呆：同一裝置填過就擋下（可被清快取/無痕繞過，真正防重複需後端綁訂單/LINE）
    try {
      if ((this.props.blockResubmit ?? true) && localStorage.getItem('mi_survey_v1_done') === '1') {
        this.setState({ alreadyDone: true });
      }
    } catch (e) {}
  }

  applyBg() {
    try {
      if (this.T) {
        document.body.style.background = this.T.page;
        if (this.rootEl) this.rootEl.style.background = this.T.page;
      }
    } catch (e) {}
  }

  componentDidUpdate() {
    this.applyBg();
    if (this._lastStep !== this.state.step) {
      this._lastStep = this.state.step;
      if (this.scrollEl) this.scrollEl.scrollTop = 0;
    }
  }

  getT() {
    const dark = (this.props.theme ?? 'tech') === 'tech';
    if (dark) return { dark: true, page: 'radial-gradient(120% 70% at 50% 0%, #0d1830 0%, #080d18 60%, #05080f 100%)', surface: '#121b2e', input: '#0d1626', ink: '#eaf1fb', mut: '#b3bdd0', sub: '#7e8aa3', border: '#27344e', sel: 'rgba(47,139,255,.16)', selBorder: '#2f8bff', blue: '#2f8bff', blueText: '#6fb0ff', track: '#1b2740', glow: '0 0 14px rgba(47,139,255,.55)', card: 'rgba(255,255,255,.05)', cardBorder: 'rgba(255,255,255,.10)', toggleBg: 'rgba(255,255,255,.08)', toggleBorder: 'rgba(255,255,255,.16)' };
    return { dark: false, page: '#f4f7fc', surface: '#ffffff', input: '#ffffff', ink: '#111111', mut: '#4a4a4a', sub: '#767676', border: '#dbe3ef', sel: '#eaf2ff', selBorder: '#0569e9', blue: '#0569e9', blueText: '#0569e9', track: '#eaeaea', glow: '0 6px 16px rgba(5,105,233,.28)', card: '#ffffff', cardBorder: '#eaeaea', toggleBg: 'rgba(255,255,255,.92)', toggleBorder: '#eaeaea' };
  }

  setLang(l) { this.setState({ lang: l }); }
  setVal(k, v) { this.setState({ [k]: v }); }
  start() { this.setState({ step: 1 }); }
  back() { this.setState(s => ({ step: Math.max(0, s.step - 1) })); }
  pickMatrix(key, ri, s) { this.setState(prev => { const m = Object.assign({}, prev[key]); m[ri] = s; return { [key]: m }; }); }
  pickRadio(v) { this.setState({ q2: v }); setTimeout(() => this.next(), 200); }
  pickNps(n) { this.setState({ nps: n }); setTimeout(() => this.next(), 220); }
  toggleChk(v) { this.setState(prev => ({ q7: prev.q7.includes(v) ? prev.q7.filter(x => x !== v) : prev.q7.concat(v) })); }

  canNext(s) {
    const d = this.steps[s];
    if (!d) return true;
    switch (d.type) {
      case 'select': return !!this.state.q1;
      case 'radio': return !!this.state.q2;
      case 'date': return !!this.state.q3;
      case 'matrix': return Object.keys(this.state[d.key]).length >= this[d.rows].length;
      case 'checks': return true;   // Q7 改為選填，降低跳出率
      case 'nps': return this.state.nps !== null;
      case 'text': return !!(this.state.q9 && this.state.q9.trim());
      default: return true;
    }
  }

  next() {
    const s = this.state.step;
    if (!this.canNext(s)) return;
    if (s >= this.QTOTAL) { this.doSubmit(); return; }
    this.setState({ step: s + 1 });
  }

  doSubmit() {
    if (this.state.submitting) return;          // 防連點重複送出
    this.setState({ submitting: true });
    const data = {
      timestamp: new Date().toISOString(),
      q1_branch: this.state.q1, q2_service: this.state.q2, q3_date: this.state.q3,
      q4_env: this.state.q4[0] || '', q4_flow: this.state.q4[1] || '', q4_return: this.state.q4[2] || '',
      q5_attitude: this.state.q5[0] || '', q5_knowledge: this.state.q5[1] || '', q5_overall: this.state.q5[2] || '',
      q6_staff: this.state.q6, q7_best: this.state.q7.join('、'), q8_nps: this.state.nps,
      q9_keywords: this.state.q9, q10_improve: this.state.q10, q12_name: this.state.q12, q13_contact: this.state.q13,
      // 來源識別（供後端決定用「哪個門市的 LINE 帳號」發券）
      store: this.srcStore || '', line_uid: this.lineUid || ''
    };
    // === INTEGRATION POINTS (for systems analyst) ===
    // 1. POST `data` to backend / Google Apps Script.
    // 2. DMS: verify eligibility before form; mark 已填寫 to block re-submit.
    // 3. LINE: issue single-use 機油兌換券 into the official LINE chat; write coupon serial back to DMS.
    console.log('[survey submit]', data);
    try { localStorage.setItem('mi_survey_v1_done', '1'); } catch (e) {}   // 標記此裝置已填寫
    const endpoint = this.props.endpointUrl || 'https://script.google.com/macros/s/AKfycby7mIrufl8U4T0ZLp12gKNoFFGlFK5BMmHbYd1gRMdKgw0_1M8QEBk3YVUWmoU7SYEm/exec';
    if (endpoint) {
      // text/plain avoids a CORS preflight; Apps Script reads e.postData.contents
      fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(data) })
        .catch(function (err) { console.warn('[survey] submit failed', err); });
    }
    this.setState({ step: this.steps.length - 1 });
  }

  bi(zh, en, style) { const h = React.createElement; return [h('span', { key: 'z', className: 'tzh', style }, zh), h('span', { key: 'e', className: 'ten', style }, en)]; }

  pill(label, onClick, opt = {}) {
    const h = React.createElement, T = this.T;
    const v = opt.variant || 'pri', dis = opt.disabled;
    let st = { border: 0, cursor: dis ? 'not-allowed' : 'pointer', borderRadius: 999, fontWeight: 700, fontSize: 16, padding: '15px 24px', transition: 'all .2s', flex: opt.flex || '0 0 auto', opacity: dis ? .4 : 1, fontFamily: 'inherit', whiteSpace: 'nowrap' };
    if (v === 'pri') Object.assign(st, { background: T.blue, color: '#fff', boxShadow: dis ? 'none' : (T.dark ? '0 0 18px rgba(47,139,255,.5)' : '0 10px 24px rgba(5,105,233,.28)') });
    if (v === 'ghost') Object.assign(st, { background: 'transparent', color: T.mut, border: '1.5px solid ' + T.border });
    if (v === 'white') Object.assign(st, { background: '#fff', color: '#0569e9' });
    return h('button', { onClick: dis ? null : onClick, disabled: dis, style: st }, label);
  }

  fieldStyle(extra) { const T = this.T; return Object.assign({ width: '100%', background: T.input, border: '1.5px solid ' + T.border, color: T.ink, fontFamily: 'inherit', fontSize: 16, borderRadius: 12 }, extra || {}); }

  selectBody() {
    const h = React.createElement, T = this.T;
    return h('div', { style: { position: 'relative' } },
      h('select', { value: this.state.q1, onChange: e => this.setVal('q1', e.target.value), style: this.fieldStyle({ fontWeight: 500, padding: '15px 40px 15px 16px', appearance: 'none', cursor: 'pointer', color: this.state.q1 ? T.ink : T.sub }) },
        [h('option', { key: '', value: '' }, '— 請選擇門市 / Select a branch —')].concat(this.BRANCHES.map(b => h('option', { key: b, value: b.split(' / ')[0] }, b)))),
      h('span', { style: { position: 'absolute', right: 16, top: '50%', transform: 'translateY(-50%)', color: T.sub, pointerEvents: 'none', fontSize: 12 } }, '▼'));
  }
  dateBody() { const h = React.createElement; return h('input', { type: 'date', value: this.state.q3, onChange: e => this.setVal('q3', e.target.value), style: this.fieldStyle({ fontFamily: "'Figtree',sans-serif", padding: '14px 16px', cursor: 'pointer', colorScheme: this.T.dark ? 'dark' : 'light' }) }); }
  textareaBody(key) { const h = React.createElement; return h('textarea', { value: this.state[key], onChange: e => this.setVal(key, e.target.value), placeholder: this.steps[this.state.step].ph, style: this.fieldStyle({ minHeight: 150, resize: 'none', padding: 16, fontWeight: 500, lineHeight: 1.5 }) }); }
  textBody() { const h = React.createElement; return h('input', { type: 'text', value: this.state.q9, onChange: e => this.setVal('q9', e.target.value), placeholder: this.steps[9].ph, style: this.fieldStyle({ fontWeight: 500, padding: '15px 16px' }) }); }
  contactBody() {
    const h = React.createElement;
    const inp = (k, ph) => h('input', { key: k, type: 'text', value: this.state[k], onChange: e => this.setVal(k, e.target.value), placeholder: ph, style: this.fieldStyle({ fontWeight: 500, padding: '15px 16px' }) });
    return h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } }, inp('q12', '姓名 / Your name（選填）'), inp('q13', '電話或 Email / Phone or Email（選填）'));
  }
  optionBtn(on, onClick, shape, inner, label) {
    const h = React.createElement, T = this.T;
    return h('button', { onClick, style: { display: 'flex', alignItems: 'center', gap: 13, textAlign: 'left', background: on ? T.sel : T.input, border: '1.5px solid ' + (on ? T.selBorder : T.border), borderRadius: 12, padding: '16px 18px', cursor: 'pointer', transition: 'all .15s', font: 'inherit', boxShadow: on && T.dark ? 'inset 0 0 0 1px rgba(47,139,255,.3)' : 'none' } }, inner, h('span', { style: { fontSize: 15.5, fontWeight: 600, color: T.ink } }, label));
  }
  radioBody() {
    const h = React.createElement, T = this.T, sel = this.state.q2;
    const opts = [{ v: '估價/收購機車', zh: '估價 / 收購機車', en: 'Trade-in / Sell Your Motorcycle' }, { v: '購買機車', zh: '購買機車', en: 'Buy a Motorcycle' }];
    return h('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } }, opts.map(o => {
      const on = sel === o.v;
      const dot = h('span', { style: { width: 20, height: 20, borderRadius: '50%', border: '2px solid ' + (on ? T.selBorder : T.border), flex: '0 0 auto', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, h('span', { style: { width: 9, height: 9, borderRadius: '50%', background: T.blue, opacity: on ? 1 : 0 } }));
      return h('div', { key: o.v }, this.optionBtn(on, () => this.pickRadio(o.v), 'r', dot, this.bi(o.zh, o.en)));
    }));
  }
  checksBody() {
    const h = React.createElement, T = this.T, sel = this.state.q7;
